
<!DOCTYPE html><html lang="ru"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="manifest" href="manifest.json">
<title>Календарь Alex</title>
<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
.header{padding:12px;text-align:center;font-weight:bold}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:#ddd}
.day{background:white;min-height:90px;padding:4px;overflow:hidden;box-sizing:border-box}
.selected{background:rgba(88,201,168,.2)!important;outline:2px solid #95CE67}
.taskpill{display:block;width:100%;max-width:100%;overflow:hidden;white-space:nowrap;text-overflow:clip;color:#fff;border-radius:4px;padding:1px 3px;margin-top:2px;font-size:10px;box-sizing:border-box}
.fab{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);width:62px;height:62px;border:none;border-radius:50%;background:#95CE67;color:white;font-size:34px}
.modal{display:none;position:fixed;left:5%;right:5%;top:10%;background:white;border-radius:20px;padding:15px;z-index:20}.overlay{z-index:10}#dayModal{z-index:15}#addModal{z-index:25}#editModal{z-index:30}
.overlay{display:none;position:fixed;inset:0;background:#0006}
.show{display:block}
input,select{width:calc(100% - 12px);padding:8px;margin:5px 6px;box-sizing:border-box}
input[type=checkbox]{width:auto;margin:0;flex:none}
.taskrow{padding:8px;border-radius:8px;margin:6px 0;color:white}

:root{
--bg:#f2eee6;
--card:#fbf8f2;
--text:#2f2b25;
--grid:#d8d1c5;
}
body{background:var(--bg);color:var(--text)}
.day,.modal{background:var(--card)}
.cal{background:var(--grid)}
.dark{
--bg:#23211d;
--card:#2f2c27;
--text:#ece4d8;
--grid:#4a443c;
}
.dark #prevMonth,
.dark #nextMonth{
color:#ece4d8;
}
.selected-color{
outline-offset:2px;
transform:scale(1.08);
}
.dark input:not([type="checkbox"]),
.dark select{
background:#3a362f;
color:#ece4d8;
border:1px solid #5a544b;
}
</style></head><body style="padding-top:24px">
<div style="position:relative">
<button id="prevMonth" style="position:absolute;left:12px;top:8px;border:none;background:transparent;font-size:22px;cursor:pointer">◀</button><div class="header" id="monthTitle">ИЮНЬ</div><button id="nextMonth" style="position:absolute;right:44px;top:8px;border:none;background:transparent;font-size:22px;cursor:pointer">▶</button>
<button id="themeBtn" style="position:absolute;right:12px;top:8px;border:none;background:transparent;padding:0;font-size:22px;cursor:pointer">🌙</button>
</div>
<div style="display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-weight:bold;color:#95CE67;background:var(--card);padding:8px 0">
<div>ПН</div><div>ВТ</div><div>СР</div><div>ЧТ</div><div>ПТ</div><div>СБ</div><div>ВС</div>
</div>
<div id="cal" class="cal"></div>
<button class="fab" onclick="openAdd()">+</button>

<div id="ov" class="overlay"></div>

<div id="addModal" class="modal">
<h3 id="selectedDateText"></h3>
<input id="name" placeholder="Название">
<input id="time" type="time" style="display:none">




<div id="colorPalette" style="display:flex;justify-content:space-between;align-items:center;width:calc(100% - 12px);margin:10px 6px;box-sizing:border-box">
<div class="c" data-color="#95CE67" style="width:28px;height:28px;border-radius:50%;background:#95CE67"></div>
<div class="c" data-color="#FFA362" style="width:28px;height:28px;border-radius:50%;background:#FFA362"></div>
<div class="c" data-color="#FB5A2C" style="width:28px;height:28px;border-radius:50%;background:#FB5A2C"></div>
<div class="c" data-color="#9E7FE7" style="width:28px;height:28px;border-radius:50%;background:#9E7FE7"></div>
<div class="c" data-color="#65A2FF" style="width:28px;height:28px;border-radius:50%;background:#65A2FF"></div>
<div class="c" data-color="#D7D7D7" style="width:28px;height:28px;border-radius:50%;background:#D7D7D7"></div>
<div class="c paletteBtn" style="width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px">🎨</div></div>

<div style="display:flex;justify-content:flex-end;align-items:center;gap:12px;margin:12px 6px 0 6px"><button onclick="document.getElementById('time').showPicker&&document.getElementById('time').showPicker()" style="border:none;background:transparent;font-size:26px;cursor:pointer">🕒</button><button onclick="saveTask()" style="border:none;background:transparent;font-size:28px;cursor:pointer">✓</button></div>

</div>

<div id="dayModal" class="modal">
<div style="display:flex;justify-content:space-between;align-items:center">
<h3 id="dayTitle"></h3>
<button onclick="openAddFromDay()">+</button>
</div>
<div id="tasks" style="max-height:55vh;overflow-y:auto;padding-right:4px"></div>

</div>


<div id="editModal" class="modal">
<h3>Редактировать задачу</h3>
<input id="editName" placeholder="Название">
<input id="editTime" type="time" style="display:none">


<div id="editColorPalette" style="display:flex;justify-content:space-between;align-items:center;width:calc(100% - 12px);margin:10px 6px;box-sizing:border-box">
<div class="ec" data-color="#95CE67" style="width:28px;height:28px;border-radius:50%;background:#95CE67"></div>
<div class="ec" data-color="#FFA362" style="width:28px;height:28px;border-radius:50%;background:#FFA362"></div>
<div class="ec" data-color="#FB5A2C" style="width:28px;height:28px;border-radius:50%;background:#FB5A2C"></div>
<div class="ec" data-color="#9E7FE7" style="width:28px;height:28px;border-radius:50%;background:#9E7FE7"></div>
<div class="ec" data-color="#65A2FF" style="width:28px;height:28px;border-radius:50%;background:#65A2FF"></div>
<div class="ec" data-color="#D7D7D7" style="width:28px;height:28px;border-radius:50%;background:#D7D7D7"></div>
<div class="ec paletteBtnEdit" style="width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px">🎨</div></div>

<div style="display:flex;justify-content:space-between;align-items:center;margin:12px 6px 0 6px"><button onclick="deleteTask()" style="border:none;background:transparent;font-size:24px;cursor:pointer">🗑️</button><div style="display:flex;align-items:center;gap:12px"><button onclick="document.getElementById('editTime').showPicker&&document.getElementById('editTime').showPicker()" style="border:none;background:transparent;font-size:26px;cursor:pointer">🕒</button><button onclick="saveEdit()" style="border:none;background:transparent;font-size:28px;cursor:pointer">✓</button></div></div>

</div>

<div id="viewModal" class="modal" style="z-index:28">
<h3 id="viewDate"></h3>
<div id="viewText" style="margin:12px 6px;font-size:18px"></div>
<div id="viewTime" style="margin:12px 6px;opacity:.8"></div>
<div style="display:flex;justify-content:space-between;align-items:center;margin:12px 6px 0 6px">
<button id="viewDeleteBtn" style="border:none;background:transparent;font-size:24px;cursor:pointer">🗑️</button>
<button id="editBtn" style="border:none;background:transparent;font-size:26px;cursor:pointer">✏️</button>
</div>
</div>

<script>
let selectedColor='#95CE67'; let editSelectedColor='#95CE67';
let db={};
let selectedDate=null; let editingTask=null; let editingDate=null; let currentDate=new Date();
selectedDate=`${currentDate.getFullYear()}-${String(currentDate.getMonth()+1).padStart(2,'0')}-${String(currentDate.getDate()).padStart(2,'0')}`;

let idb;
const openReq=indexedDB.open('AlexCalendarDB',1);
openReq.onupgradeneeded=e=>{
  e.target.result.createObjectStore('data');
};
openReq.onsuccess=e=>{
  idb=e.target.result;
  const tx=idb.transaction('data','readonly');
  const store=tx.objectStore('data');
  const req=store.get('tasks');
  req.onsuccess=()=>{
    db=req.result||{};
    render();
  };
};

function save(){
 if(!idb) return;
 const tx=idb.transaction('data','readwrite');
 tx.objectStore('data').put(db,'tasks');
}

const weekdays=['ВС','ПН','ВТ','СР','ЧТ','ПТ','СБ'];
function formatDateWithWeekday(ds){
 const d=new Date(ds);
 return ds.slice(8,10)+'.'+ds.slice(5,7)+' '+weekdays[d.getDay()];
}


function render(){
 let y=currentDate.getFullYear(),m=currentDate.getMonth();
 const months=['ЯНВАРЬ','ФЕВРАЛЬ','МАРТ','АПРЕЛЬ','МАЙ','ИЮНЬ','ИЮЛЬ','АВГУСТ','СЕНТЯБРЬ','ОКТЯБРЬ','НОЯБРЬ','ДЕКАБРЬ'];
 document.getElementById('monthTitle').textContent=months[m];
let days=new Date(y,m+1,0).getDate();
cal.innerHTML='';

// смещение первого дня месяца
let firstDay=new Date(y,m,1).getDay();
firstDay=(firstDay+6)%7; // переводим: ПН=0 ... ВС=6

let totalCells=Math.ceil((days+firstDay)/7)*7;

for(let d=1-firstDay;d<=totalCells-firstDay;d++){
  let isNextMonth=d>days;
  let cellDate=new Date(y,m,d);
  let dayNum=cellDate.getDate();
  let ds=`${cellDate.getFullYear()}-${String(cellDate.getMonth()+1).padStart(2,'0')}-${String(cellDate.getDate()).padStart(2,'0')}`;

  let div=document.createElement('div');
  div.className='day'+(selectedDate===ds?' selected':'');
  div.innerHTML='<b style="opacity:'+(cellDate.getMonth()!==m?0.45:1)+'">'+dayNum+'</b>';

  let active=(db[ds]||[]).filter(x=>!x.done).sort((a,b)=>{
 const at=!!a.time;
 const bt=!!b.time;
 if(at && !bt) return -1;
 if(!at && bt) return 1;
 return (a.time||'').localeCompare(b.time||'');
});
  active.slice(0,3).forEach(t=>{
   let p=document.createElement('div');
   p.className='taskpill';
   p.style.background=t.color;
   p.textContent=t.name;
   div.appendChild(p);
  });

  div.onclick=()=>{
   selectedDate=ds;
   render();
   if((db[ds]||[]).length>0){openDay(ds)}
  };

  cal.appendChild(div);
 }
}

function openAdd(){
 if(!selectedDate){alert('Сначала выбери день');return;}
 selectedDateText.textContent=formatDateWithWeekday(selectedDate);
 document.getElementById('name').value='';
 document.getElementById('time').value='';

 selectedColor='#95CE67';
 document.querySelectorAll('.c').forEach(x=>{x.classList.remove('selected-color');x.style.outline='none';});

 const first=document.querySelectorAll('.c')[0];
 if(first){
   first.classList.add('selected-color');
   first.style.outline='3px solid '+first.dataset.color;
 }

 ov.classList.add('show');
 addModal.classList.add('show');
}

function openAddFromDay(){
 addModal.classList.add('show');
 ov.classList.add('show');
 selectedDateText.textContent=formatDateWithWeekday(selectedDate);
 document.getElementById('name').value='';
 document.getElementById('time').value='';

 selectedColor='#95CE67';
 document.querySelectorAll('.c').forEach(x=>{x.classList.remove('selected-color');x.style.outline='none';});
 const first=document.querySelectorAll('.c')[0];
 if(first){
   first.classList.add('selected-color');
   first.style.outline='3px solid '+first.dataset.color;
 }
}

function openDay(ds){
 selectedDate=ds;
 dayTitle.textContent=formatDateWithWeekday(ds);
 tasks.innerHTML='';

 let arr=(db[ds]||[]).sort((a,b)=>{
 if(a.done!==b.done) return a.done-b.done;
 const at=!!a.time;
 const bt=!!b.time;
 if(at && !bt) return -1;
 if(!at && bt) return 1;
 return (a.time||'').localeCompare(b.time||'');
});

 arr.forEach(t=>{
  let row=document.createElement('div');
  row.className='taskrow';
  row.style.background=t.color;
  if(t.done) row.style.opacity='0.45';

  row.innerHTML=`<div style="display:flex;align-items:center;gap:10px;"><input type="checkbox" ${t.done?'checked':''}><span>${t.name}</span></div>`;

  row.querySelector('div').onclick=()=>{ openView(ds,t); }; row.querySelector('input').onclick=(e)=>{e.stopPropagation();}; row.querySelector('input').onchange=()=>{
   t.done=!t.done;
   save();
   openDay(ds);
   
render();
 if(dayModal.classList.contains('show')){
   openDay(selectedDate);
 }
  };

  tasks.appendChild(row);
 });

 ov.classList.add('show');
 dayModal.classList.add('show');
}



function openView(ds,t){
 editingTask=t;
 editingDate=ds;
 document.getElementById('viewDate').textContent=formatDateWithWeekday(ds);
 document.getElementById('viewText').textContent=t.name;
 document.getElementById('viewTime').textContent=t.time||'';
 viewModal.classList.add('show');
 ov.classList.add('show');
 document.getElementById('editBtn').onclick=()=>{
   viewModal.classList.remove('show');
   openEdit(ds,t);
 };
}

function openEdit(ds,t){
 editingTask=t; editingDate=ds;
 document.getElementById('editName').value=t.name;
 document.getElementById('editTime').value=t.time;
editSelectedColor=t.color || '#95CE67';
 document.querySelectorAll('.ec').forEach(x=>{x.classList.remove('selected-color');x.style.outline='none';});
 const activeEdit=[...document.querySelectorAll('.ec')].find(x=>x.dataset.color===editSelectedColor);
 if(activeEdit){activeEdit.classList.add('selected-color');activeEdit.style.outline='3px solid '+activeEdit.dataset.color;}
 editModal.classList.add('show');
 ov.classList.add('show');
}

function saveEdit(){
 editingTask.name=document.getElementById('editName').value;
 editingTask.time=document.getElementById('editTime').value;
editingTask.color=editSelectedColor;
 save(); closeAll(); 
render(); openDay(editingDate);
}

function deleteTask(){
 db[editingDate]=db[editingDate].filter(x=>x!==editingTask);
 save();
 editModal.classList.remove('show');
 
render();
 openDay(editingDate);
}

function saveTask(){

 let color=selectedColor;

 db[selectedDate]=db[selectedDate]||[];
 const taskName=document.getElementById('name').value;
 const taskTime=document.getElementById('time').value;
 const nameInput=document.getElementById('name');
 if(!taskName.trim()){
   nameInput.focus();
   return;
 }


 db[selectedDate].push({
  name:taskName,
  time:taskTime,
  color:color,
  done:false
 });

 save();
 document.getElementById('name').value='';
 document.getElementById('time').value='';
 addModal.classList.remove('show');
 if(!dayModal.classList.contains('show')){
   ov.classList.remove('show');
 }
  
render();
 if(dayModal.classList.contains('show')){
   openDay(selectedDate);
 }
}

function closeAll(){
 if(viewModal.classList.contains('show')){viewModal.classList.remove('show');return;} if(editModal.classList.contains('show')){
   editModal.classList.remove('show');
   return;
 }
 if(addModal.classList.contains('show')){
   addModal.classList.remove('show');
   if(!dayModal.classList.contains('show')) ov.classList.remove('show');
   return;
 }
 ov.classList.remove('show');
 dayModal.classList.remove('show');
 editModal.classList.remove('show');
 addModal.classList.remove('show');
}

ov.onclick=(e)=>{
 if(customColorModal.classList.contains('show')){
   customColorModal.classList.remove('show');
   return;
 }
 if(e.target===ov){ closeAll(); }
};

const savedTheme=localStorage.getItem('theme');
if(savedTheme==='dark'){
 document.body.classList.add('dark');
 document.getElementById('themeBtn').textContent='☀️';
}

document.getElementById('themeBtn').onclick=()=>{
 document.body.classList.toggle('dark');
 const dark=document.body.classList.contains('dark');
 document.getElementById('themeBtn').textContent=dark?'☀️':'🌙';
 localStorage.setItem('theme',dark?'dark':'light');
};


document.addEventListener('click',(e)=>{
 if(e.target.classList.contains('c')){
   selectedColor=e.target.dataset.color;
   document.querySelectorAll('.c').forEach(x=>{x.classList.remove('selected-color');x.style.outline='none';});
   e.target.classList.add('selected-color'); e.target.style.outline='3px solid '+e.target.dataset.color;
 }
 if(e.target.classList.contains('ec')){
   editSelectedColor=e.target.dataset.color;
   document.querySelectorAll('.ec').forEach(x=>{x.classList.remove('selected-color');x.style.outline='none';});
   e.target.classList.add('selected-color'); e.target.style.outline='3px solid '+e.target.dataset.color;
 }
});

if(document.querySelector('.c')){document.querySelector('.c').classList.add('selected-color');document.querySelector('.c').style.outline='3px solid '+document.querySelector('.c').dataset.color;}
if(document.querySelector('.ec')){document.querySelector('.ec').classList.add('selected-color');document.querySelector('.ec').style.outline='3px solid '+document.querySelector('.ec').dataset.color;}



document.getElementById('prevMonth').onclick=()=>{
 currentDate=new Date(currentDate.getFullYear(),currentDate.getMonth()-1,1);
 render();
};

document.getElementById('nextMonth').onclick=()=>{
 currentDate=new Date(currentDate.getFullYear(),currentDate.getMonth()+1,1);
 render();
};


let touchStartX=0;
let touchEndX=0;

const calendarArea=document.getElementById('cal');

calendarArea.addEventListener('touchstart',(e)=>{
 touchStartX=e.changedTouches[0].screenX;
});

calendarArea.addEventListener('touchend',(e)=>{
 touchEndX=e.changedTouches[0].screenX;

 const diff=touchEndX-touchStartX;

 if(diff>50){
  currentDate=new Date(currentDate.getFullYear(),currentDate.getMonth()-1,1);
  render();
 }

 if(diff<-50){
  currentDate=new Date(currentDate.getFullYear(),currentDate.getMonth()+1,1);
  render();
 }
});



document.getElementById('viewDeleteBtn').onclick=()=>{
 if(!editingTask || !editingDate) return;
 db[editingDate]=db[editingDate].filter(x=>x!==editingTask);
 save();
 viewModal.classList.remove('show');
 render();
 openDay(editingDate);
};

// render() is called after IndexedDB loads
</script>

<div id="customColorModal" class="modal" style="z-index:40">
<div id="paletteGrid" style="display:grid;grid-template-columns:repeat(12,1fr);gap:2px;margin-bottom:10px"></div>
<div style="display:flex;justify-content:flex-end">
<button id="customOk" style="border:none;background:transparent;font-size:28px">✓</button>
</div>
</div>

<script>
let customColor=localStorage.getItem('customColor')||'#D7D7D7';

const paletteColors=[
'#012933','#031634','#150A2C','#240D29','#2C0D15','#320B04','#321503','#2F2202','#342802','#343303','#293007','#19270E',
'#014D65','#012765','#271255','#451255','#53132B','#641302','#642A04','#644504','#665304','#676802','#535F0B','#324E1D',
'#037399','#003B99','#391880','#63197A','#7D1C3F','#931B03','#973E02','#996802','#987B03','#989A00','#7E8D10','#4A742A',
'#0798CF','#0050CB','#4B1FA8','#8621A5','#A52651','#C52501','#CA5303','#CB8B03','#C9A600','#CCD000','#A5BB11','#629B34',
'#06BCFE','#0062FD','#5E29D3','#A82BCD','#D12E65','#FC2F00','#FF6801','#FFAD01','#FECE00','#FFFF00','#CEEA11','#79BF3F',
'#38C9FF','#3484FD','#7D53DB','#BA55D7','#DB5985','#FB5A2C','#FE8630','#FFBB32','#FDD732','#FFFF2F','#DBEF42','#95CE67',
'#68D8FE','#65A2FF','#9E7FE7','#CA81E0','#E384A2','#FF8262','#FFA463','#FFCE67','#FFE167','#FFFF63','#E4F475','#AFD98F'
]

let tempCustomColor='#D7D7D7';
const pg=document.getElementById('paletteGrid');
if(pg){
 paletteColors.forEach(c=>{
   const d=document.createElement('div');
   d.style.cssText='height:34px;border-radius:4px;background:'+c+';cursor:pointer';
   d.dataset.color=c;
   d.onclick=()=>{
      tempCustomColor=c;
      [...pg.children].forEach(x=>x.style.transform='scale(1)');
      d.style.transform='scale(1.18)';
   };
   pg.appendChild(d);
 });
}


function updateCustomColor(){
 const addLast=document.querySelectorAll('.c')[5];
 const editLast=document.querySelectorAll('.ec')[5];

 if(addLast){
   addLast.style.background=customColor;
   addLast.dataset.color=customColor;
 }
 if(editLast){
   editLast.style.background=customColor;
   editLast.dataset.color=customColor;
 }
}
updateCustomColor();

document.addEventListener('click',e=>{
 if(e.target.classList.contains('paletteBtn') || e.target.classList.contains('paletteBtnEdit')){
   customColorModal.classList.add('show');
   ov.classList.add('show');
 }
});

customOk.onclick=()=>{
 customColor=tempCustomColor;
 localStorage.setItem('customColor',customColor);
 updateCustomColor();

 document.querySelectorAll('.c,.ec').forEach(x=>{x.classList.remove('selected-color');x.style.outline='none';});

 let last=document.querySelectorAll('.c')[5];
 if(last){
   selectedColor=customColor;
   last.classList.add('selected-color');
   last.style.outline='3px solid '+customColor;
 }
 let lastE=document.querySelectorAll('.ec')[5];
 if(lastE){
   editSelectedColor=customColor;
   lastE.classList.add('selected-color');
   lastE.style.outline='3px solid '+customColor;
 }

 customColorModal.classList.remove('show');
if(!addModal.classList.contains('show') && !editModal.classList.contains('show') && !dayModal.classList.contains('show')){
  ov.classList.remove('show');
}
};



</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js');
  });
}
</script>
</body></html>
